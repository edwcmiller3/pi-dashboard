<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pi Dashboard</title>
<!-- Self-hosted, subset weather-icons font (no CDN — prod requirement). -->
<link rel="stylesheet" href="vendor/weather-icons/weather-icons.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- v4 layout (bento over ambient glow). Designed for the 1280x800 effective
       viewport (scale 1.5). app.js fills every region from data.json; only the
       shell + the "Upcoming" heading are static.
       `glass-blur` is the Phase-9 frosted-glass OPT-IN: it turns .glass cards
       into real backdrop-filter frosted glass, but ONLY where the compositor can
       accelerate it (the rules are also behind @supports in style.css). Remove
       this one class to fall back to the no-blur "safe" build. -->
  <div class="screen glass-blur">

    <div class="top">
      <section class="glass clock-card">
        <div class="clock" id="clock"></div>
        <div class="date" id="date"></div>
        <!-- Shown only while the Pi clock is NOT NTP-synced (clock_synced=false),
             since the big clock ticks from the browser and would be wrong. -->
        <div class="clock-warn" id="clock-warn" hidden>clock not yet synced</div>
      </section>
      <section class="glass current-card" id="current-card"></section>
    </div>

    <!-- Forecast = 4 FUTURE days only (today's H/L lives in the hero). -->
    <div class="forecast" id="forecast"></div>

    <section class="glass agenda-card">
      <h1>Upcoming</h1>
      <div class="agenda-body" id="agenda-body"></div>
      <div class="status" id="status"></div>
    </section>

  </div>

  <!-- Nightly blackout (1a–6a) — wall-clock-driven full-screen black overlay.
       The panel has no DDC/CI or /sys/class/backlight (spikes 0.4/0.5), so this
       CSS overlay is the only blackout available: backlight + Pi stay on, the
       screen just renders black. app.js toggles it from the local clock (not a
       runtime timer) so the Phase-8 03:00 reboot returns to black, not the
       bright dashboard. -->
  <div class="blackout" id="blackout" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
