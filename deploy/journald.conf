# journald: keep ALL logs in RAM, never on the SD card.
# Installs to /etc/systemd/journald.conf.d/00-kiosk-volatile.conf (system; root).
#
# Storage decision (2026-06-30): read-write SD root, and persistent journald was
# deliberately DROPPED — continuous log writes are the heaviest SD-wear source.
# `Storage=volatile` routes the journal to tmpfs (/run/log/journal), so:
#   - kiosk/backend logs are still queryable LIVE for the current boot
//     (`journalctl --user -u kiosk.service`, `... -u chromium-kiosk.service`),
#     which is all the 0.10-soak "no journal files" follow-up actually needs for
#     debugging;
#   - NOTHING touches the SD card — zero log-driven wear;
#   - logs are lost on reboot. With the nightly 03:00 reboot, cross-reboot history
#     was ~a day anyway, so little is given up. If a specific failure needs to
#     survive a reboot, capture it manually (`journalctl ... > file`) before
#     rebooting, or temporarily flip Storage=persistent for the investigation.
#
# RuntimeMaxUse caps the RAM the journal may use so a log storm can't pressure
# memory on the Pi.

[Journal]
Storage=volatile
RuntimeMaxUse=64M
