# Console autologin on tty1 + quiet boot. systemd drop-in.
# Installs to /etc/systemd/system/getty@tty1.service.d/autologin.conf (system; root).
#
# Promotes the Phase-0 bring-up drop-in (see plan 0.0 — used because raspi-config's
# `nonint do_boot_behaviour` is broken on Trixie). Phase 8 adds quiet-boot flags so
# the panel doesn't flash console text / the "My IP address is ..." banner before
# labwc + Chromium paint (0.8 finding):
#   --noclear   don't clear+redraw the tty (no blink)
#   --noissue   don't print /etc/issue
#   --autologin logs the kiosk user in automatically -> the user systemd manager
#               starts (lingering also covers this), bringing up kiosk.service etc.
#
# NOTE: --noissue alone does NOT suppress Pi OS's "My IP address is ..." banner on
# Trixie — that text lives in the issue.d drop-in /etc/issue.d/IP.issue (agetty
# \4 \6 escapes) and still printed despite --noissue. Empty that file too; see the
# quiet-boot step in deploy/README.md.
#
# >>> Replace KIOSK_USER below with the actual Pi username before installing. <<<
# (Or regenerate this file from the README one-liner, which substitutes $USER.)

[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin KIOSK_USER --noclear --noissue %I $TERM
